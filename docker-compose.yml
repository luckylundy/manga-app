services:
  # PHPアプリケーション
  app:
    build:
      context: .
      dockerfile: docker/php/Dockerfile
    volumes:
    # バインドマウントでローカルとコンテナのコードを同期
      - .:/var/www/html
      # public/buildを消さないようにする
      - /var/www/html/public/build
    environment:
      APP_ENV: local
    env_file:
      - .env.docker
    depends_on:
      - mysql

  # Nginxサーバー
  nginx:
    image: nginx:latest
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  # MySQLデータベース
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: manga_app
      MYSQL_ROOT_PASSWORD: password
      MYSQL_USER: manga_user
      MYSQL_PASSWORD: password
    volumes:
      - mysql_data:/var/lib/mysql
    ports:
      # ローカルのHerd使用のためポート番号をずらした
      - "3307:3306"

volumes:
  mysql_data: