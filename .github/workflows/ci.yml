name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: PHPのセットアップ
        uses: shivammathur/setup-php@v2
        with: 
          php-version: '8.4'

      - name: Composerのインストール
        run: composer install

      - name: .envのセットアップ
        run: cp .env.example .env

      - name: アプリケーションキーの生成
        run: php artisan key:generate

      - name: Node.jsのセットアップ
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: フロントエンドのビルド
        run: | 
          npm install
          npm run build

      - name: テストの実行
        run: php artisan test