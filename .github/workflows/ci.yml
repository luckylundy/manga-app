name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/chekcout@v4

      - name: PHPのセットアップ
        uses: shivammathur/setup-php@v2
        with: 
          php-version: '8.4'

      - name: Composerのインストール
        run: composer install

      - name: .env.testingのセットアップ
        run: cp .env.testing .env

      - name: アプリケーションキーの生成
        run: php artisan key:generate

      - name: テストの実行
        run: php artisan test